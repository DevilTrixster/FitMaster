<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>История тренировок — FitMaster</title>
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/history.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="logo">Fit<span class="accent">Master</span></h1>
      <nav class="nav">
        <a href="/dashboard" class="btn btn-outline">Кабинет</a>
        <a href="/history" class="btn btn-primary">История</a>
        <button id="logoutBtn" class="btn btn-outline">Выход</button>
      </nav>
    </header>

    <main class="history-page">
      <h2>📜 История тренировок</h2>
      
      <div class="history-filters">
        <select id="statusFilter">
          <option value="all">Все</option>
          <option value="completed">Завершённые</option>
          <option value="skipped">Пропущенные</option>
        </select>
        <input type="date" id="dateFrom" placeholder="С даты">
        <input type="date" id="dateTo" placeholder="По дату">
      </div>
      
      <div id="historyList" class="history-list">
        <div class="loading">Загрузка...</div>
      </div>
      
      <button id="loadMoreBtn" class="btn btn-outline">Загрузить ещё</button>
    </main>

    <footer class="footer">
      <p>&copy; 2026 FitMaster. Все права защищены.</p>
    </footer>
  </div>

  <script src="/js/history.js"></script>
</body>
</html>
