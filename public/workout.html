<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тренировка - FitMaster</title>
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/workout.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">Fit<span class="brand-accent">Master</span></div>
    <div class="nav-user">
      <button id="finishBtn" class="btn btn-outline" disabled>Завершить тренировку</button>
    </div>
  </nav>

  <div class="container">
    <!-- Таймер отдыха -->
    <div class="timer-section">
      <div class="timer-icon">⏱️</div>
      <div class="timer-display" id="timerDisplay">00:00</div>
      <button id="startTimerBtn" class="btn btn-primary btn-small">Старт</button>
      <button id="resetTimerBtn" class="btn btn-outline btn-small">Сброс</button>
    </div>

    <!-- Список упражнений -->
    <div id="exercisesList" class="exercises-grid">
      <!-- Сюда JS добавит карточки -->
    </div>

    <!-- Блок завершения -->
    <div id="completionSection" class="completion-card hidden">
      <h2>🎉 Тренировка завершена!</h2>
      <p>Оцени своё самочувствие и оставь комментарий</p>
      
      <div class="wellness-rating">
        <label>Самочувствие:</label>
        <div class="stars" id="starContainer">
          <span class="star" data-value="1">⭐</span>
          <span class="star" data-value="2">⭐</span>
          <span class="star" data-value="3">⭐</span>
          <span class="star" data-value="4">⭐</span>
          <span class="star" data-value="5">⭐</span>
        </div>
      </div>

      <textarea id="commentsInput" placeholder="Комментарии к тренировке (необязательно)"></textarea>
      
      <button id="submitFinishBtn" class="btn btn-primary">Сохранить и вернуться</button>
    </div>
  </div>

  <script src="/js/common.js"></script>
  <script src="/js/workout.js"></script>
</body>
</html>
