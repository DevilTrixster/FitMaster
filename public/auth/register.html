<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация - FitMaster</title>
  <link rel="stylesheet" href="/css/common.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">Fit<span class="brand-accent">Master</span></div>
    <div class="nav-user">
      <a href="/auth/login.html" class="btn btn-outline">Вход</a>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-card" style="max-width: 600px;">
      <h1 class="auth-title">Регистрация</h1>
      <form id="registerForm">
        <div class="form-row">
          <div class="form-group">
            <label>Никнейм *</label>
            <input type="text" name="nickname" required placeholder="Ваш никнейм">
          </div>
          <div class="form-group">
            <label>Email *</label>
            <input type="email" name="email" required placeholder="example@mail.ru">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Имя *</label>
            <input type="text" name="firstName" required placeholder="Имя">
          </div>
          <div class="form-group">
            <label>Фамилия *</label>
            <input type="text" name="lastName" required placeholder="Фамилия">
          </div>
        </div>

        <div class="form-group">
          <label>Пароль *</label>
          <input type="password" name="password" required placeholder="••••••••">
        </div>

        <div class="form-group">
          <label>Подтвердите пароль *</label>
          <input type="password" name="confirmPassword" required placeholder="••••••••">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Дата рождения *</label>
            <input type="date" name="birthDate" required>
          </div>
          <div class="form-group">
            <label>Пол *</label>
            <select name="gender" required>
              <option value="">Выберите пол</option>
              <option value="male">Мужской</option>
              <option value="female">Женский</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Рост (см) *</label>
            <input type="number" name="height" required placeholder="175">
          </div>
          <div class="form-group">
            <label>Вес (кг) *</label>
            <input type="number" name="weight" step="0.1" required placeholder="70">
          </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
          Создать аккаунт
        </button>
      </form>
      <div class="auth-link">
        Уже есть аккаунт? <a href="/auth/login.html">Войти</a>
      </div>
    </div>
  </div>

  <script src="/js/common.js"></script>
  <script src="/js/register.js"></script>
</body>
</html>
