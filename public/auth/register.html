<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация — FitMaster</title>
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="logo">Fit<span class="accent">Master</span></h1>
      <nav class="nav">
        <a href="/auth/login.html" class="btn btn-outline">Вход</a>
      </nav>
    </header>

    <main class="form-container">
      <h2>Регистрация</h2>
      <form id="registerForm" class="auth-form">
        <div class="form-row">
          <div class="form-group">
            <label for="nickname">Никнейм *</label>
            <input type="text" id="nickname" name="nickname" required>
          </div>
          <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="firstName">Имя *</label>
            <input type="text" id="firstName" name="firstName" required>
          </div>
          <div class="form-group">
            <label for="lastName">Фамилия *</label>
            <input type="text" id="lastName" name="lastName" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="password">Пароль *</label>
            <input type="password" id="password" name="password" required>
          </div>
          <div class="form-group">
            <label for="confirmPassword">Подтвердите пароль *</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="birthDate">Дата рождения *</label>
            <input type="date" id="birthDate" name="birthDate" required>
          </div>
          <div class="form-group">
            <label for="gender">Пол *</label>
            <select id="gender" name="gender" required>
              <option value="">Выберите пол</option>
              <option value="male">Мужской</option>
              <option value="female">Женский</option>
              <option value="other">Другой</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="height">Рост (см) *</label>
            <input type="number" id="height" name="height" required>
          </div>
          <div class="form-group">
            <label for="weight">Вес (кг) *</label>
            <input type="number" id="weight" name="weight" step="0.1" required>
          </div>
        </div>

        <div id="message" class="message"></div>

        <button type="submit" class="btn btn-primary btn-full">Зарегистрироваться</button>
      </form>

      <p class="form-footer">Уже есть аккаунт? <a href="/auth/login.html">Войти</a></p>
    </main>

    <footer class="footer">
      <p>&copy; 2026 FitMaster. Все права защищены.</p>
    </footer>
  </div>

  <script src="/js/register.js"></script>
</body>
</html>
