<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация - FitMaster</title>
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/auth.css">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
</head>
<body>
  <!-- Навигация -->
  <nav class="navbar">
    <div class="nav-brand">Fit<span class="brand-accent">Master</span></div>
    <div class="nav-user">
      <a href="/auth/login.html" class="nav-link">Вход</a>
    </div>
  </nav>

  <!-- Основной контент -->
  <div class="auth-container">
    <div class="auth-card">
      <h1 class="auth-title">Регистрация</h1>
      
      <div id="message" class="message"></div>
      
      <form id="registerForm">
        <!-- Никнейм и Email -->
        <div class="form-row">
          <div class="form-group">
            <label for="nickname">Никнейм *</label>
            <input type="text" id="nickname" name="nickname" placeholder="Ваш никнейм" required>
          </div>
          <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" placeholder="your@email.com" required>
          </div>
        </div>

        <!-- Имя и Фамилия -->
        <div class="form-row">
          <div class="form-group">
            <label for="firstName">Имя *</label>
            <input type="text" id="firstName" name="firstName" placeholder="Имя" required>
          </div>
          <div class="form-group">
            <label for="lastName">Фамилия *</label>
            <input type="text" id="lastName" name="lastName" placeholder="Фамилия" required>
          </div>
        </div>

        <!-- Пароли -->
        <div class="form-group">
          <label for="password">Пароль *</label>
          <input type="password" id="password" name="password" placeholder="Минимум 6 символов" required minlength="6">
        </div>

        <div class="form-group">
          <label for="confirmPassword">Подтвердите пароль *</label>
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Повторите пароль" required>
        </div>

        <!-- Дата рождения и Пол -->
        <div class="form-row">
          <div class="form-group">
            <label for="birthDate">Дата рождения *</label>
            <input type="date" id="birthDate" name="birthDate" required>
          </div>
          <div class="form-group">
            <label for="gender">Пол *</label>
            <div class="select-wrapper">
              <select id="gender" name="gender" required>
                <option value="" disabled selected>Выберите пол</option>
                <option value="male">Мужской</option>
                <option value="female">Женский</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Рост и Вес -->
        <div class="form-row">
          <div class="form-group">
            <label for="height">Рост (см) *</label>
            <input type="number" id="height" name="height" placeholder="175" min="100" max="250" required>
          </div>
          <div class="form-group">
            <label for="weight">Вес (кг) *</label>
            <input type="number" id="weight" name="weight" placeholder="75" min="30" max="300" step="0.1" required>
          </div>
        </div>

        <!-- Кнопка регистрации -->
        <button type="submit" class="btn-submit">Создать аккаунт</button>
      </form>

      <!-- Ссылка на вход -->
      <p class="auth-footer">
        Уже есть аккаунт? <a href="/auth/login.html">Войти</a>
      </p>
    </div>
  </div>

  <script src="/js/register.js"></script>
</body>
</html>
