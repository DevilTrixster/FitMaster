<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — FitMaster</title>
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="logo">Fit<span class="accent">Master</span></h1>
      <nav class="nav">
        <a href="/auth/register.html" class="btn btn-outline">Регистрация</a>
      </nav>
    </header>

    <main class="form-container">
      <h2>Вход</h2>
      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="email">Email *</label>
          <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
          <label for="password">Пароль *</label>
          <input type="password" id="password" name="password" required>
        </div>

        <div id="message" class="message"></div>

        <button type="submit" class="btn btn-primary btn-full">Войти</button>
      </form>

      <p class="form-footer">Нет аккаунта? <a href="/auth/register.html">Зарегистрироваться</a></p>
    </main>

    <footer class="footer">
      <p>&copy; 2026 FitMaster. Все права защищены.</p>
    </footer>
  </div>

  <script src="/js/login.js"></script>
</body>
</html>
