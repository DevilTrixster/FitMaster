<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход - FitMaster</title>
  <link rel="stylesheet" href="/css/common.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">Fit<span class="brand-accent">Master</span></div>
    <div class="nav-user">
      <a href="/auth/register.html" class="btn btn-outline">Регистрация</a>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <h1 class="auth-title">Вход</h1>
      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" required placeholder="example@mail.ru">
        </div>
        <div class="form-group">
          <label>Пароль</label>
          <input type="password" name="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Войти</button>
      </form>
      <div class="auth-link">
        Нет аккаунта? <a href="/auth/register.html">Зарегистрироваться</a>
      </div>
    </div>
  </div>

  <script src="/js/common.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
