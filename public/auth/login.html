<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход - FitMaster</title>
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/auth.css">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
</head>
<body>
  <!-- Навигация -->
  <nav class="navbar">
    <div class="nav-brand">Fit<span class="brand-accent">Master</span></div>
    <div class="nav-user">
      <a href="/auth/register.html" class="nav-link">Регистрация</a>
    </div>
  </nav>

  <!-- Основной контент -->
  <div class="auth-container">
    <div class="auth-card" style="max-width: 450px;">
      <h1 class="auth-title">Вход</h1>
      
      <div id="message" class="message"></div>
      
      <form id="loginForm">
        <!-- Email -->
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="your@email.com" required>
        </div>

        <!-- Пароль -->
        <div class="form-group">
          <label for="password">Пароль</label>
          <input type="password" id="password" name="password" placeholder="Введите пароль" required>
        </div>

        <!-- Кнопка входа -->
        <button type="submit" class="btn-submit">Войти</button>
      </form>

      <!-- Ссылка на регистрацию -->
      <p class="auth-footer">
        Нет аккаунта? <a href="/auth/register.html">Зарегистрироваться</a>
      </p>
    </div>
  </div>

  <script src="/js/login.js"></script>
</body>
</html>
