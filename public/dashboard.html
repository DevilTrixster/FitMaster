<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Личный кабинет - FitMaster</title>
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">Fit<span class="brand-accent">Master</span></div>
    <div class="nav-user">
      <a href="/dashboard" class="nav-link active">Личный кабинет</a>
      <a href="/history" class="nav-link">История</a>
      <a href="/progress" class="nav-link">Прогресс</a>
      <a href="/profile" class="nav-link">Профиль</a>
      <button id="logoutBtn" class="btn btn-outline">Выход</button>
    </div>
  </nav>

  <div class="container">
    <div class="dashboard-grid">
      <!-- Левая колонка: Статистика -->
      <div class="sidebar">
        <div class="card stat-section">
          <h2>📊 Статистика</h2>
          <div class="stat-item">
            <div class="stat-value" id="totalWorkouts">0</div>
            <div class="stat-label">Тренировок</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="avgWellness">-</div>
            <div class="stat-label">Самочувствие</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="currentStreak">0</div>
            <div class="stat-label">Дней подряд</div>
          </div>
        </div>
      </div>

      <!-- Правая колонка: Предстоящие тренировки -->
      <div class="main-content">
        <div class="card">
          <h2>📅 Предстоящие тренировки</h2>
          <div id="upcomingWorkouts">
            <div class="loading">Загрузка...</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/common.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
