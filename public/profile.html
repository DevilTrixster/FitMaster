<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Профиль - FitMaster</title>
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/profile.css">
</head>
<body>
  <!-- Навигация -->
  <nav class="navbar">
    <div class="nav-brand">Fit<span class="brand-accent">Master</span></div>
    <div class="nav-user">
      <a href="/dashboard" class="nav-link">Личный кабинет</a>
      <a href="/history" class="nav-link">История</a>
      <a href="/progress" class="nav-link">Прогресс</a>
      <a href="/suggestions" class="nav-link">Рекомендация</a>
      <a href="/profile" class="nav-link active">Профиль</a>
      <!-- Исправление: добавлен класс btn-logout для красного цвета -->
      <a href="#" id="logoutBtn" class="nav-link btn-logout">Выход</a>
    </div>
  </nav>

  <!-- Основной контент -->
  <div class="container">
    <div class="profile-card">
      <div class="profile-header">
        <h1>👤 Настройки профиля</h1>
        <p class="subtitle">Измените свои данные для более точных рекомендаций</p>
      </div>

      <div id="message" class="message hidden"></div>

      <form id="profileForm">
        <!-- Ряд 1: Никнейм и Email -->
        <div class="form-row">
          <div class="form-group">
            <label for="nickname">Никнейм</label>
            <input type="text" id="nickname" name="nickname" required>
          </div>
          <div class="form-group">
            <label for="email">Email (нельзя изменить)</label>
            <input type="email" id="email" name="email" disabled readonly>
          </div>
        </div>

        <!-- Ряд 2: Имя и Фамилия -->
        <div class="form-row">
          <div class="form-group">
            <label for="firstName">Имя</label>
            <input type="text" id="firstName" name="firstName" required>
          </div>
          <div class="form-group">
            <label for="lastName">Фамилия</label>
            <input type="text" id="lastName" name="lastName" required>
          </div>
        </div>

        <!-- Ряд 3: Рост и Вес -->
        <div class="form-row">
          <div class="form-group">
            <label for="height">Рост (см)</label>
            <input type="number" id="height" name="height" min="100" max="250" required>
          </div>
          <div class="form-group">
            <label for="weight">Вес (кг)</label>
            <input type="number" id="weight" name="weight" min="30" max="300" step="0.1" required>
          </div>
        </div>

        <!-- Ряд 4: Время тренировки -->
        <div class="form-group full-width">
          <label for="preferredWorkoutTime">Предпочтительное время тренировки</label>
          <input type="time" id="preferredWorkoutTime" name="preferredWorkoutTime">
          <small class="form-hint">Время, когда вы обычно занимаетесь (например, 17:00). Новые тренировки будут создаваться на это время.</small>
        </div>

        <!-- Кнопка сохранения -->
        <button type="submit" class="btn btn-primary btn-large">💾 Сохранить изменения</button>
      </form>
    </div>
  </div>

  <script src="/js/profile.js"></script>
</body>
</html>
