<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Профиль - FitMaster</title>
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/profile.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">Fit<span class="brand-accent">Master</span></div>
    <div class="nav-user">
      <a href="/dashboard" class="nav-link">Личный кабинет</a>
      <a href="/history" class="nav-link">История</a>
      <a href="/progress" class="nav-link">Прогресс</a>
      <a href="/suggestions" class="nav-link">Рекомендация</a>
      <a href="/profile" class="nav-link active">Профиль</a>
      <button id="logoutBtn" class="btn btn-outline">Выход</button>
    </div>
  </nav>

  <div class="container">
    <div class="profile-card">
      <h1>👤 Настройки профиля</h1>
      <p class="subtitle">Измените свои данные для более точных рекомендаций</p>

      <form id="profileForm">
        <div class="form-row">
          <div class="form-group">
            <label>Никнейм</label>
            <input type="text" name="nickname" id="nickname" required>
          </div>
          <div class="form-group">
            <label>Email (только для чтения)</label>
            <input type="email" id="email" disabled style="opacity: 0.5; cursor: not-allowed;">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Имя</label>
            <input type="text" name="firstName" id="firstName" required>
          </div>
          <div class="form-group">
            <label>Фамилия</label>
            <input type="text" name="lastName" id="lastName" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Рост (см)</label>
            <input type="number" name="height" id="height" required min="100" max="250">
          </div>
          <div class="form-group">
            <label>Вес (кг)</label>
            <input type="number" name="weight" id="weight" required min="30" max="300" step="0.1">
          </div>
        </div>

        <div class="form-group">
          <label for="preferredWorkoutTime">Предпочтительное время тренировки</label>
          <input type="time" id="preferredWorkoutTime" name="preferredWorkoutTime">
          <small style="color: var(--light-gray); font-size: 0.85rem;">
            Время, когда вы обычно занимаетесь (например, 17:00)
          </small>
      </div>

        <button type="submit" class="btn btn-primary btn-large">💾 Сохранить изменения</button>
      </form>
      <div id="message" class="message hidden"></div>
    </div>
  </div>

  <script src="/js/common.js"></script>
  <script src="/js/profile.js"></script>
</body>
</html>
