version: '3.8'
services:
  db:
    image: postgres:15
    container_name: fitmaster_db
    environment:
      POSTGRES_USER: fitmaster_user
      POSTGRES_PASSWORD: fitmaster_pass
      POSTGRES_DB: fitmaster_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: